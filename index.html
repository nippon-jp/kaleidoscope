<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Interactive Kaleidoscope</title>
    <meta name="description" content="High-performance interactive kaleidoscope.">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            color: #fff;
            font-family: system-ui, -apple-system, sans-serif;
            touch-action: none;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            cursor: none; /* カーソルを非表示にして没入感を高める */
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const buffer = document.createElement('canvas');
        const bctx = buffer.getContext('2d', { alpha: false });

        let width, height, radius, dpr;
        let segments = 12;
        let zoom = 1.0;
        let time = 0;
        
        let centerX, centerY;
        let targetCenterX, targetCenterY;
        
        let mouseX = 0, mouseY = 0;
        let targetMouseX = 0, targetMouseY = 0;
        
        let initialPinchDist = null;
        let initialZoom = 1.0;
        let lastTapTime = 0;

        const PARTICLE_COUNT = 800; 
        let particles = [];

        function init() {
            resize();
            // 初期状態を中心にする
            centerX = targetCenterX = width / 2;
            centerY = targetCenterY = height / 2;
            
            createParticles();
            
            window.addEventListener('resize', handleResize);
            window.addEventListener('mousemove', handleMouseMove);
            window.addEventListener('touchstart', handleTouchStart, { passive: false });
            window.addEventListener('touchmove', handleTouchMove, { passive: false });
            window.addEventListener('touchend', handleTouchEnd, { passive: false });
            window.addEventListener('mousedown', handleMouseDown);
            window.addEventListener('keydown', handleKeyDown);

            animate();
        }

        function handleResize() {
            const oldW = width, oldH = height;
            resize();
            targetCenterX = (targetCenterX / oldW) * width;
            targetCenterY = (targetCenterY / oldH) * height;
        }

        function handleMouseMove(e) {
            targetMouseX = (e.clientX - width / 2) / (width / 2);
            targetMouseY = (e.clientY - height / 2) / (height / 2);
        }

        function handleMouseDown(e) {
            const now = Date.now();
            if (now - lastTapTime < 300) {
                createParticles();
            } else {
                targetCenterX = e.clientX;
                targetCenterY = e.clientY;
                cycleSegments();
            }
            lastTapTime = now;
        }

        function handleTouchStart(e) {
            e.preventDefault();
            if (e.touches.length === 2) {
                initialPinchDist = Math.hypot(
                    e.touches[0].pageX - e.touches[1].pageX,
                    e.touches[0].pageY - e.touches[1].pageY
                );
                initialZoom = zoom;
            } else if (e.touches.length === 1) {
                const now = Date.now();
                const touch = e.touches[0];
                if (now - lastTapTime < 300) {
                    createParticles();
                } else {
                    targetCenterX = touch.clientX;
                    targetCenterY = touch.clientY;
                    cycleSegments();
                }
                lastTapTime = now;
            }
        }

        function handleTouchMove(e) {
            e.preventDefault();
            if (e.touches.length === 2 && initialPinchDist !== null) {
                const currentDist = Math.hypot(
                    e.touches[0].pageX - e.touches[1].pageX,
                    e.touches[0].pageY - e.touches[1].pageY
                );
                const delta = currentDist / initialPinchDist;
                zoom = Math.min(Math.max(initialZoom * delta, 0.4), 4.0);
            } else if (e.touches.length === 1) {
                const touch = e.touches[0];
                targetCenterX = touch.clientX;
                targetCenterY = touch.clientY;
            }
        }

        function handleTouchEnd(e) {
            if (e.touches.length < 2) initialPinchDist = null;
        }

        function handleKeyDown(e) {
            // キーボードショートカットは利便性のために残す
            if (e.key.toLowerCase() === 's') saveImage();
        }

        function saveImage() {
            const link = document.createElement('a');
            link.download = `kaleidoscope-${Date.now()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        function cycleSegments() {
            const options = [6, 8, 12, 16, 24, 32];
            let currentIndex = options.indexOf(segments);
            segments = options[(currentIndex + 1) % options.length];
        }

        function resize() {
            dpr = window.devicePixelRatio || 1;
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            radius = Math.max(width, height) * 1.5;
            buffer.width = radius;
            buffer.height = radius;
        }

        function createParticles() {
            particles = [];
            const rand = Math.random();
            let theme = rand < 0.4 ? 'warm' : (rand < 0.8 ? 'pastel' : 'random');
            const warmHues = [0, 15, 30, 45, 60, 345, 355];
            let baseHue = warmHues[Math.floor(Math.random() * warmHues.length)];

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                let h, s, l;
                if (theme === 'pastel') {
                    h = Math.random() * 360;
                    s = 50 + Math.random() * 30;
                    l = 75 + Math.random() * 15;
                } else if (theme === 'warm') {
                    h = (baseHue + Math.random() * 80 - 40) % 360;
                    s = 85 + Math.random() * 15;
                    l = 50 + Math.random() * 30;
                } else {
                    h = Math.random() * 360;
                    s = 80 + Math.random() * 20;
                    l = 55 + Math.random() * 25;
                }

                particles.push({
                    angle: Math.random() * Math.PI * 2,
                    dist: Math.random(), 
                    speed: 0.0005 + Math.random() * 0.002,
                    size: 12 + Math.random() * 53, 
                    rot: Math.random() * Math.PI * 2,
                    vr: (Math.random() - 0.5) * 0.015,
                    hue: h,
                    sat: s,
                    light: l,
                    offset: Math.random() * 100
                });
            }
        }

        function drawSource() {
            bctx.fillStyle = '#050505';
            bctx.fillRect(0, 0, buffer.width, buffer.height);
            bctx.save();
            bctx.translate(buffer.width / 2, buffer.height / 2);
            bctx.scale(zoom, zoom);
            bctx.translate(mouseX * 120, mouseY * 120);
            bctx.rotate(time * 0.01);

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const p = particles[i];
                p.dist += p.speed;
                if (p.dist > 1.2) { p.dist = 0; p.angle = Math.random() * Math.PI * 2; }

                const scale = Math.pow(p.dist, 2.2); 
                const currentDist = p.dist * radius; 
                const currentSize = p.size * (0.2 + scale * 2.5); 
                const alpha = Math.min(p.dist * 5.0, 0.8) * (1.1 - p.dist);
                if (alpha < 0.05) continue;

                bctx.save();
                bctx.rotate(p.angle);
                bctx.translate(currentDist, Math.sin(time * 0.2 + p.offset) * 12);
                bctx.rotate(p.rot + time * p.vr * 10);
                
                const grad = bctx.createRadialGradient(0, 0, 0, 0, 0, currentSize);
                grad.addColorStop(0, `hsla(${p.hue}, ${p.sat}%, ${p.light + 10}%, ${alpha})`);
                grad.addColorStop(0.4, `hsla(${p.hue}, ${p.sat}%, ${p.light - 10}%, ${alpha * 0.6})`);
                grad.addColorStop(1, `hsla(${p.hue}, ${p.sat}%, ${p.light - 30}%, 0)`);
                
                bctx.fillStyle = grad;
                bctx.beginPath();
                bctx.arc(0, 0, currentSize, 0, Math.PI * 2);
                bctx.fill();

                if (alpha > 0.2) {
                    bctx.strokeStyle = `hsla(${p.hue}, 100%, 90%, ${alpha * 0.4})`;
                    bctx.lineWidth = 1;
                    bctx.stroke();
                }
                bctx.restore();
            }
            bctx.restore();
        }

        function animate() {
            requestAnimationFrame(animate);
            time += 0.01;
            centerX += (targetCenterX - centerX) * 0.12;
            centerY += (targetCenterY - centerY) * 0.12;
            mouseX += (targetMouseX - mouseX) * 0.05;
            mouseY += (targetMouseY - mouseY) * 0.05;

            drawSource();
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, width, height);

            const sliceAngle = (Math.PI * 2) / segments;
            ctx.save();
            ctx.translate(centerX, centerY);
            for (let i = 0; i < segments; i++) {
                ctx.save();
                ctx.rotate(i * sliceAngle);
                if (i % 2 === 1) ctx.scale(1, -1);
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.arc(0, 0, radius, -sliceAngle / 2, sliceAngle / 2);
                ctx.lineTo(0, 0);
                ctx.clip();
                ctx.drawImage(buffer, 0, -radius / 2, radius, radius);
                ctx.restore();
            }
            ctx.restore();
            
            const centerGlow = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, radius * 0.95);
            centerGlow.addColorStop(0, 'rgba(0,0,0,0.2)');
            centerGlow.addColorStop(0.25, 'rgba(0,0,0,0)');
            centerGlow.addColorStop(1, 'rgba(0,0,0,0.75)');
            ctx.fillStyle = centerGlow;
            ctx.fillRect(0, 0, width, height);
        }

        window.onload = init;
    </script>
</body>
</html>
