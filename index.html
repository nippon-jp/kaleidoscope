<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Infinite Colorful Block Tunnel</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            touch-action: none;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    let scene, camera, renderer, tunnelGroup;
    let velocity = new THREE.Vector3(0, 0, 0);
    let targetVelocity = new THREE.Vector3(0, 0, 0);
    let lastTapTime = 0;

    let isPressing = false;
    let pressStartTime = 0;
    const LONG_PRESS_THRESHOLD = 400; 

    let isDragging = false;
    let previousTouchX = 0;
    let previousTouchY = 0;
    let rotationTargetX = 0;
    let rotationTargetY = 0;

    const COLORS = [
        0x00E5FF, // シアン
        0xFF007F, // マゼンタ
        0xFFD600, // イエロー
        0x0045FF, // ブルー
        0xFF3D00, // オレンジ/レッド
        0x76FF03, // ライム
        0x6200EA  // パープル
    ];
    
    const BLOCK_COUNT = 600; 
    const TUNNEL_RANGE_Z = 220; 
    const SPAWN_DIST_Z = 20; 

    function init() {
        scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.012);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 0);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setClearColor(0x000000, 1);
        document.body.appendChild(renderer.domElement);

        tunnelGroup = new THREE.Group();
        scene.add(tunnelGroup);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.25);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0xffffff, 1.8, 85);
        camera.add(pointLight);
        scene.add(camera);

        for (let i = 0; i < BLOCK_COUNT; i++) {
            const z = (Math.random() * (TUNNEL_RANGE_Z + SPAWN_DIST_Z)) - TUNNEL_RANGE_Z;
            createAndPlaceComplexObject(z);
        }

        window.addEventListener('resize', onWindowResize);
        
        const el = renderer.domElement;
        el.addEventListener('touchstart', handleStart, { passive: false });
        el.addEventListener('touchmove', handleMove, { passive: false });
        el.addEventListener('touchend', handleEnd, { passive: false });
        el.addEventListener('mousedown', (e) => handleStart(normalizeMouseEvent(e)));
        window.addEventListener('mousemove', (e) => handleMove(normalizeMouseEvent(e)));
        window.addEventListener('mouseup', (e) => handleEnd(normalizeMouseEvent(e)));
        el.addEventListener('dblclick', resetPosition);

        animate();
    }

    function createAndPlaceComplexObject(zPos, group = null) {
        if (!group) {
            group = new THREE.Group();
            tunnelGroup.add(group);
        } else {
            while(group.children.length > 0){ 
                group.remove(group.children[0]); 
            }
        }

        const color = COLORS[Math.floor(Math.random() * COLORS.length)];
        const material = new THREE.MeshPhongMaterial({
            color: color,
            shininess: 40,
            specular: 0x222222
        });

        const geometry = new THREE.BoxGeometry(1, 1, 1);
        const shapeType = Math.floor(Math.random() * 6);
        const orientation = Math.floor(Math.random() * 3); 
        const thick = Math.random() * 0.8 + 0.3; 
        const length = Math.random() * 15 + 5;   

        const createBar = (w, h, d, px=0, py=0, pz=0) => {
            const mesh = new THREE.Mesh(geometry, material);
            mesh.scale.set(w, h, d);
            mesh.position.set(px, py, pz);
            group.add(mesh);
        };

        switch(shapeType) {
            case 0: // Single Bar
                if (orientation === 0) createBar(length, thick, thick);
                else if (orientation === 1) createBar(thick, length, thick);
                else createBar(thick, thick, length);
                break;
            case 1: // L-Shape
                if (orientation === 0) {
                    createBar(length, thick, thick);
                    createBar(thick, length/2, thick, length/2, length/4, 0);
                } else if (orientation === 1) {
                    createBar(thick, length, thick);
                    createBar(length/2, thick, thick, length/4, length/2, 0);
                } else {
                    createBar(thick, thick, length);
                    createBar(thick, length/2, thick, 0, length/4, length/2);
                }
                break;
            case 2: // U-Shape
                const side = length/3;
                if (orientation === 0) {
                    createBar(length, thick, thick);
                    createBar(thick, side, thick, length/2, side/2, 0);
                    createBar(thick, side, thick, -length/2, side/2, 0);
                } else {
                    createBar(thick, length, thick);
                    createBar(side, thick, thick, side/2, length/2, 0);
                    createBar(side, thick, thick, side/2, -length/2, 0);
                }
                break;
            case 3: // Cross
                const cL = length * 0.7;
                createBar(cL, thick, thick);
                createBar(thick, cL, thick);
                if (Math.random() > 0.5) createBar(thick, thick, cL);
                break;
            case 4: // Hollow Square
                const fS = length / 4;
                createBar(fS * 2, thick, thick, 0, fS, 0);
                createBar(fS * 2, thick, thick, 0, -fS, 0);
                createBar(thick, fS * 2, thick, fS, 0, 0);
                createBar(thick, fS * 2, thick, -fS, 0, 0);
                break;
            case 5: // Cluster
                const clusterCount = 3 + Math.floor(Math.random() * 4);
                for(let j=0; j<clusterCount; j++) {
                    const s = Math.random() * 2 + 0.5;
                    createBar(s, s, s, (Math.random()-0.5)*5, (Math.random()-0.5)*5, (Math.random()-0.5)*5);
                }
                break;
        }

        const angle = Math.random() * Math.PI * 2;
        const radius = 5 + Math.random() * 12;
        group.position.x = camera.position.x + Math.cos(angle) * radius;
        group.position.y = camera.position.y + Math.sin(angle) * radius;
        group.position.z = zPos;
        group.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
    }

    function normalizeMouseEvent(e) {
        return {
            touches: [{ clientX: e.clientX, clientY: e.clientY }],
            preventDefault: () => e.preventDefault()
        };
    }

    function handleStart(e) {
        e.preventDefault();
        const touch = e.touches[0];
        const now = Date.now();
        if (now - lastTapTime < 300) { 
            resetPosition(); 
            lastTapTime = 0; 
            isPressing = false;
            return; 
        }
        lastTapTime = now;
        isPressing = true;
        pressStartTime = now;
        isDragging = true;
        previousTouchX = touch.clientX;
        previousTouchY = touch.clientY;

        const mouse = new THREE.Vector2((touch.clientX / window.innerWidth) * 2 - 1, -(touch.clientY / window.innerHeight) * 2 + 1);
        const raycaster = new THREE.Raycaster();
        raycaster.setFromCamera(mouse, camera);
        targetVelocity.copy(raycaster.ray.direction).multiplyScalar(0.85);
    }

    function handleMove(e) {
        if (!isDragging) return;
        const touch = e.touches[0];
        const deltaX = touch.clientX - previousTouchX;
        const deltaY = touch.clientY - previousTouchY;
        rotationTargetY -= deltaX * 0.0045;
        rotationTargetX -= deltaY * 0.0045;
        previousTouchX = touch.clientX;
        previousTouchY = touch.clientY;
    }

    function handleEnd() { 
        isDragging = false; 
        isPressing = false;
    }

    function resetPosition() {
        velocity.set(0, 0, 0);
        targetVelocity.set(0, 0, 0);
        camera.position.set(0, 0, 0);
        rotationTargetX = 0;
        rotationTargetY = 0;
        camera.rotation.set(0, 0, 0);
        tunnelGroup.children.forEach(group => {
            const z = (Math.random() * (TUNNEL_RANGE_Z + SPAWN_DIST_Z)) - TUNNEL_RANGE_Z;
            createAndPlaceComplexObject(z, group);
        });
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);

        if (isPressing && (Date.now() - pressStartTime > LONG_PRESS_THRESHOLD)) {
            targetVelocity.lerp(new THREE.Vector3(0,0,0), 0.12);
        }

        velocity.lerp(targetVelocity, 0.04);
        camera.position.add(velocity);

        camera.rotation.x += (rotationTargetX - camera.rotation.x) * 0.1;
        camera.rotation.y += (rotationTargetY - camera.rotation.y) * 0.1;

        tunnelGroup.children.forEach(group => {
            const diffZ = group.position.z - camera.position.z;
            if (diffZ > SPAWN_DIST_Z) {
                createAndPlaceComplexObject(camera.position.z - TUNNEL_RANGE_Z, group);
            } 
            else if (diffZ < -TUNNEL_RANGE_Z) {
                createAndPlaceComplexObject(camera.position.z + SPAWN_DIST_Z, group);
            }
            const diffX = group.position.x - camera.position.x;
            const diffY = group.position.y - camera.position.y;
            if (Math.abs(diffX) > 40 || Math.abs(diffY) > 40) {
                createAndPlaceComplexObject(group.position.z, group);
            }
        });

        renderer.render(scene, camera);
    }

    window.onload = init;
</script>

</body>
</html>
